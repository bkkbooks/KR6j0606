body:
  text: 三藏法師義淨奉制譯如是我聞一時薄伽梵在布怛洛迦山為諸人天一切大衆演說法要遍觀十方以妙音聲告觀自在菩薩妙吉祥菩薩言善男子有經名一切如來所護觀察衆生示現佛剎莊嚴王陀羅尼我昔初發心時於花光顯現如來所與九十俱胝衆生一聞此法皆得如來智慧之分咸蒙授記於諸佛剎當得作佛我亦於中蒙佛授記善男子我以佛眼觀見過去三萬如來為諸衆生說此法要汝觀自在及妙吉祥於說法時皆為導首爾時世尊說是語已現前大衆菩薩聲聞諸來聽者咸發信心供養彼佛于時無量百千俱胝那庾多衆生皆蒙授記亦得菩薩勝妙等持病苦悉除蓋纏消滅所願滿足善根成就顏容端正財寶豐盈國王大臣諸衆生類見者歡喜念慧神通無不圓備於佛法僧得不壞信壽命色力有大威勢無愛別離怨憎會苦若有善男子善女人等能於此經五輪著地生希有心以諸花香瓔鬘幡蓋恭敬供養歸依讚歎讀誦受持若自書寫若教人書無量功德皆悉成就見受持者生信敬心亦於現身衆德具足皆得菩薩勝妙等持口中恆出栴檀香氣其目皎淨如青蓮葉於晝夜中見佛形像及大菩薩若有五無間等業障之罪悉皆消滅諸天衛護命終之時得見諸佛菩薩心不錯亂必得往生極樂國土我與斯人授記作佛彼見我身恭敬供養於妙菩提心不疑惑若復有人於此法門讀誦受持供養恭敬若自書寫若教人書及有得聞此經名者當知此人即是菩薩應修供養若復此人由先惡業財命色力內外所資悉皆短乏所求不遂親愛別離國土荒殘王賊衰難由此經力現身輕受或暫頭痛或得惡衣惡食或遭罵詈及餘毀辱往諸業障即自消除善男子彼持經之人應生此念我昔流轉生死海中於諸有情造作衆惡不善之業日夜增長今時覺了不敢覆藏發露罪源誠心懺悔於佛法僧起不壞信若復彼人曾於佛法僧寶獨覺聲聞父母師長作諸惡業衣食果報皆當散盡由經力故此業咸除衣食充足若復彼人有捺洛迦受苦之業愛別離苦生盲之苦無根二根異熟之業亦皆消滅又復由先嫉妬瞋恚惡業之力當墮琰摩王界傍生餓鬼諸惡趣中由經力故所有惡業無不消滅一切福德悉皆增長善男子若於方處有此法門彼諸人等常為此經之所擁護功德具足所求圓滿恆受富樂惡業消除亦無橫死及諸惡夢無有病苦鬪戰常勝壽命延長色力具足有大威勢一切世間人及天龍諸鬼神等皆隨意轉不遭惡毒水火災橫乃至由持神呪力故常蒙諸佛之所授記若善男子善女人得聞如是神呪受持讀誦若自書若教人書恭敬供養彼善男子善女人皆獲如前所說功德爾時世尊說此語已大地忽然六種震動此諸大衆以妙花香塗香鬘蓋勝妙衣服奉上世尊同聲唱言善哉善哉我等云何得聞如來所說神呪爾時世尊即說呪曰南謨薩婆呾他揭多喃一但姪他二勃睇三蘇勃睇四盧迦毗盧計五盧迦伐底羯囒帝六薩埵阿伐盧羯泥去七薩婆呾他揭多阿提瑟恥帝八薩婆阿奢鉢唎晡唎泥去九聚丁達囇十捺羅提婆布侍帝十一呾他揭多慎若那達睇十二呾他揭多阿提瑟侘泥娜十三薩婆盧迦速企婆跋覩十四薩婆羯磨鉢唎叉耶野十五麼麼阿木羯寫自稱已名十六薩婆薩埵難者十七曷洛叉婆跋覩十八呾他揭多阿提瑟侘泥娜十九莎訶二十但是口邊作字者皆可彈舌道之善男子此之神呪乃是三萬如來之所宣說共所加護我今亦復說此神呪為欲利益一切有情令得安樂常作擁護除其病苦生諸佛國若復有人作如是念如佛所說神呪功德我今云何而能成就即於晨朝早起清淨於一切有情興大慈悲發憐愍心除諸嫉妬憍慢瞋恚恭敬一心於佛像前香花飲食廣興供養禮十方佛心祈所願誦此神呪滿一百八遍於一一遍各呪一花以一一花供養於佛此人即便隨所願求悉皆如意亦於夢中得見諸佛臨命終時覩佛菩薩捨身之後必得往生極樂世界壽命色力悉皆具足一切怨讎並生歡喜說此呪時六萬有情得無生法忍永除諸障所願滿足爾時世尊說此經已觀自在菩薩妙吉祥菩薩一切大衆聞佛所說歡喜奉行
